name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-smoke:
    name: Lint shell + Node syntax + install smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck — install script and git hooks
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'code-graph/hooks/post-commit code-graph/hooks/pre-push'
          ignore_paths: node_modules

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node syntax check (code-graph)
        run: |
          set -e
          for f in $(find code-graph -name '*.js' -not -path '*/node_modules/*'); do
            echo "checking $f"
            node --check "$f"
          done

      - name: Install script smoke test
        run: |
          set -euo pipefail
          # Build a fake git project as the install target.
          tmp="$(mktemp -d)"
          (cd "$tmp" && git init -q && git -c user.email=ci@x -c user.name=ci commit -q --allow-empty -m init)

          # Run the installer in symlink mode (default).
          ./scripts/install.sh "$tmp"

          # Every workflow file in workflows/ (except README.md) must exist as a
          # symlink in the target's .windsurf/workflows/.
          missing=0
          for src in workflows/*; do
            name="$(basename "$src")"
            [ "$name" = "README.md" ] && continue
            if [ ! -L "$tmp/.windsurf/workflows/$name" ]; then
              echo "missing symlink: $name"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "install.sh smoke test failed: $missing missing entries"
            exit 1
          fi
          echo "symlink mode: OK"

          # Re-run with --copy into a second target, verify no symlinks.
          tmp2="$(mktemp -d)"
          (cd "$tmp2" && git init -q && git -c user.email=ci@x -c user.name=ci commit -q --allow-empty -m init)
          ./scripts/install.sh --copy "$tmp2"

          # Top-level entries should exist and not be symlinks.
          for src in workflows/*; do
            name="$(basename "$src")"
            [ "$name" = "README.md" ] && continue
            if [ ! -e "$tmp2/.windsurf/workflows/$name" ]; then
              echo "missing entry (copy mode): $name"
              exit 1
            fi
            if [ -L "$tmp2/.windsurf/workflows/$name" ]; then
              echo "unexpected symlink in --copy mode: $name"
              exit 1
            fi
          done
          echo "copy mode: OK"

          # Idempotency: re-running install on the same target should not error.
          ./scripts/install.sh "$tmp"
          echo "idempotency: OK"

      - name: skills/ in sync with workflows/
        run: |
          set -euo pipefail
          ./scripts/sync-skills.sh
          # Plain git status; filter to skills/ entries. No flags that could
          # vary across git versions.
          dirty="$(git status --porcelain | grep ' skills/' || true)"
          if [ -n "$dirty" ]; then
            echo
            echo "skills/ is out of sync with workflows/:"
            echo "$dirty"
            echo
            echo "Run scripts/sync-skills.sh locally and commit the result."
            exit 1
          fi
          echo "skills/ is in sync."

      - name: Plugin manifest is valid JSON and references existing skills
        run: |
          set -euo pipefail
          # Validate JSON.
          python3 -c "import json,sys; json.load(open('.claude-plugin/plugin.json'))"
          # Every listed skill path must exist with a SKILL.md inside.
          missing=0
          while IFS= read -r path; do
            full="${path#./}"
            if [ ! -f "$full/SKILL.md" ]; then
              echo "missing skill referenced in plugin.json: $path"
              missing=$((missing + 1))
            fi
          done < <(python3 -c "
          import json
          for s in json.load(open('.claude-plugin/plugin.json'))['skills']:
              print(s)
          ")
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "plugin manifest: OK"

      - name: Claude Code installer smoke test
        run: |
          set -euo pipefail

          # Skills mode (default) — copies skills/ into the target.
          tmp="$(mktemp -d)"
          (cd "$tmp" && git init -q && git -c user.email=ci@x -c user.name=ci commit -q --allow-empty -m init)
          ./scripts/install-claude-code.sh "$tmp"

          missing=0
          for src in workflows/*.md; do
            name="$(basename "$src" .md)"
            [ "$name" = "README" ] && continue
            if [ ! -f "$tmp/.claude/skills/$name/SKILL.md" ]; then
              echo "missing skill: $name"
              missing=$((missing + 1))
            fi
            # Confirm `name:` was inserted into frontmatter.
            if ! head -5 "$tmp/.claude/skills/$name/SKILL.md" | grep -q "^name: $name\$"; then
              echo "missing or wrong name: in $name/SKILL.md"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "skills mode: $missing failures"
            exit 1
          fi
          echo "skills mode: OK"

          # Companion-bearing skills must include their bundled files.
          for skill in software-security security-review code-knowledge-graph; do
            count="$(find "$tmp/.claude/skills/$skill" -type f ! -name SKILL.md | wc -l)"
            if [ "$count" -lt 1 ]; then
              echo "skill $skill missing companion files"
              exit 1
            fi
          done
          echo "companion files: OK"

          # Commands mode — companion-bearing workflows skipped, others copied.
          tmp2="$(mktemp -d)"
          (cd "$tmp2" && git init -q && git -c user.email=ci@x -c user.name=ci commit -q --allow-empty -m init)
          ./scripts/install-claude-code.sh --commands "$tmp2"

          for src in workflows/*.md; do
            name="$(basename "$src" .md)"
            [ "$name" = "README" ] && continue
            if [ -d "workflows/$name" ]; then
              if [ -e "$tmp2/.claude/commands/$name.md" ]; then
                echo "$name should have been skipped in commands mode"
                exit 1
              fi
            else
              if [ ! -f "$tmp2/.claude/commands/$name.md" ]; then
                echo "missing command: $name"
                exit 1
              fi
            fi
          done
          echo "commands mode: OK"
